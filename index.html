<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jewel Jothi Tech — Login</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Full-screen background -->
  <div class="bg-overlay"></div>

  <!-- Site title top-center -->
  <h1 class="site-title">Jewel Jothi Tech</h1>

  <!-- Glass card — left side -->
  <div class="glass-card" id="glassCard">

    <!-- ════════════ LOGIN PANEL ════════════ -->
    <div class="panel" id="loginPanel">
      <h2 class="panel-title">Sign In</h2>

      <div class="alert alert-error"   id="loginError"></div>
      <div class="alert alert-success" id="loginSuccess"></div>

      <div class="field-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="fi">&#9993;</span>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="field-err" id="loginEmailErr"></span>
      </div>

      <div class="field-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="fi">&#128274;</span>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
          <span class="eye" id="loginEye" onclick="togglePw('loginPassword','loginEye')">&#128065;</span>
        </div>
        <span class="field-err" id="loginPasswordErr"></span>
      </div>

      <button class="btn-primary" id="loginBtn" onclick="submitLogin()">Sign In</button>

      <p class="switch-text">
        Don't have an account?
        <a href="#" onclick="switchTo('register')">Sign Up</a>
      </p>
    </div>

    <!-- ════════════ REGISTER PANEL ════════════ -->
    <div class="panel hidden" id="registerPanel">
      <h2 class="panel-title">Create Account</h2>

      <div class="alert alert-error"   id="regError"></div>
      <div class="alert alert-success" id="regSuccess"></div>

      <div class="row-2">
        <div class="field-group">
          <label>First Name</label>
          <div class="input-wrap">
            <span class="fi">&#128100;</span>
            <input type="text" id="regFirst" placeholder="First name" autocomplete="given-name">
          </div>
          <span class="field-err" id="regFirstErr"></span>
        </div>

        <div class="field-group">
          <label>Last Name</label>
          <div class="input-wrap">
            <span class="fi">&#128100;</span>
            <input type="text" id="regLast" placeholder="Last name" autocomplete="family-name">
          </div>
          <span class="field-err" id="regLastErr"></span>
        </div>
      </div>

      <div class="field-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="fi">&#9993;</span>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="field-err" id="regEmailErr"></span>
      </div>

      <div class="field-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="fi">&#128274;</span>
          <input type="password" id="regPassword" placeholder="Min. 6 characters">
          <span class="eye" id="regEye" onclick="togglePw('regPassword','regEye')">&#128065;</span>
        </div>
        <span class="field-err" id="regPasswordErr"></span>
      </div>

      <div class="field-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <span class="fi">&#128274;</span>
          <input type="password" id="regConfirm" placeholder="Repeat password">
        </div>
        <span class="field-err" id="regConfirmErr"></span>
      </div>

      <button class="btn-primary" id="regBtn" onclick="submitRegister()">Create Account</button>

      <p class="switch-text">
        Already have an account?
        <a href="#" onclick="switchTo('login')">Sign In</a>
      </p>
    </div>

  </div><!-- /glass-card -->

  <script src="Script.js"></script>
</body>
</html>
